{% extends "web/base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-card">
    {% if form.errors %}<p class="error">Invalid credentials</p>{% endif %}
    <p class="auth-title">Log in</p>
    <form method="post">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit" class="btn btn-primary btn-full" style="width: 100%;">Continue</button>
    </form>
    <p><a href="{% url 'register' %}">Create an account</a></p>
</div>
{% endblock %}
