version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: dropbox_clone
      POSTGRES_USER: latifahz
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  server:
    build: .
    ports:
      - "8000:8000"
    environment:
      POSTGRES_DB: dropbox_clone
      POSTGRES_USER: latifahz
      POSTGRES_PASSWORD: password
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: dropbox-clone
    depends_on:
      - db
      - minio
    volumes:
      - ./dropboxClone:/app

volumes:
  postgres_data:
  minio_data: